<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日期计算器</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect x='10' y='10' width='80' height='80' fill='white' stroke='black' stroke-width='8'/%3E%3Ctext x='50' y='72' font-family='Arial, sans-serif' font-size='60' font-weight='bold' text-anchor='middle' fill='black'%3EZ%3C/text%3E%3C/svg%3E">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            color: white;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 30px;
            margin-bottom: 25px;
        }

        .card-title {
            display: flex;
            align-items: center;
            font-size: 1.3rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }

        .card-title .number {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 0.9rem;
            margin-right: 12px;
        }

        .card:nth-child(2) .number {
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .card:nth-child(3) .number {
            background: linear-gradient(135deg, #f093fb, #f5576c);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 600px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-size: 0.9rem;
            font-weight: 500;
            color: #555;
            margin-bottom: 8px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 16px;
            font-size: 1rem;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            transition: all 0.3s ease;
            background: #fafafa;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .result-box {
            margin-top: 25px;
            padding: 25px;
            border-radius: 12px;
            text-align: center;
        }

        .result-box.blue {
            background: linear-gradient(135deg, #e8f4fd, #d4e9f7);
        }

        .result-box.pink {
            background: linear-gradient(135deg, #fef0f5, #fce4ec);
        }

        .result-label {
            font-size: 0.95rem;
            color: #666;
            margin-bottom: 8px;
        }

        .result-value {
            font-size: 2.5rem;
            font-weight: 700;
        }

        .result-box.blue .result-value {
            color: #667eea;
        }

        .result-box.pink .result-value {
            color: #f5576c;
        }

        .result-unit {
            font-size: 1.1rem;
            color: #666;
            margin-top: 5px;
        }

        .result-detail {
            font-size: 1.1rem;
            color: #555;
            margin-top: 10px;
        }

        .footer {
            text-align: center;
            color: rgba(255,255,255,0.9);
            font-size: 0.9rem;
            margin-top: 20px;
            padding: 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
        }

        .footer .contact {
            margin-bottom: 10px;
        }

        .footer .author {
            font-weight: 500;
        }

        .footer .email {
            color: rgba(255,255,255,0.8);
        }

        .footer .email a {
            color: rgba(255,255,255,0.9);
            text-decoration: none;
        }

        .footer .email a:hover {
            text-decoration: underline;
        }

        .footer .copyright {
            margin-top: 10px;
            opacity: 0.7;
            font-size: 0.85rem;
        }

        .arrow {
            display: inline-block;
            margin: 0 8px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📅 日期计算器</h1>
            <p>简单实用的日期计算工具</p>
        </div>

        <!-- 功能1: 计算日期差 -->
        <div class="card">
            <div class="card-title">
                <span class="number">1</span>
                计算两个日期之间的天数差
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="date1">开始日期</label>
                    <input type="date" id="date1">
                </div>
                <div class="form-group">
                    <label for="date2">结束日期</label>
                    <input type="date" id="date2">
                </div>
            </div>
            <div class="result-box blue">
                <div class="result-label">两个日期之间相差</div>
                <div class="result-value" id="daysDiff">0</div>
                <div class="result-unit">天</div>
            </div>
        </div>

        <!-- 功能2: 推算日期 -->
        <div class="card">
            <div class="card-title">
                <span class="number">2</span>
                推算日期
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="startDate">起始日期</label>
                    <input type="date" id="startDate">
                </div>
                <div class="form-group">
                    <label for="amount">时间数量</label>
                    <input type="number" id="amount" value="1" min="-10000" max="10000">
                </div>
            </div>
            <div class="form-group">
                <label for="unit">时间单位</label>
                <select id="unit">
                    <option value="days">天</option>
                    <option value="weeks">星期</option>
                    <option value="months">月</option>
                    <option value="years">年</option>
                </select>
            </div>
            <div class="result-box pink">
                <div class="result-label" id="calculationDesc">今天后 1 天</div>
                <div class="result-value" id="futureDate">-</div>
                <div class="result-detail" id="futureDateDetail"></div>
            </div>
        </div>

        <div class="footer">
            <div class="contact">
                <span class="author">Author: OliverChow</span>
                <span class="email"> | Email: <a href="mailto:zhougw@gmail.com">zhougw@gmail.com</a></span>
            </div>
            <div class="copyright">日期计算器 © 2026</div>
        </div>
    </div>

    <script>
        // 获取今天的日期字符串 (YYYY-MM-DD格式)
        function getTodayString() {
            const today = new Date();
            const year = today.getFullYear();
            const month = String(today.getMonth() + 1).padStart(2, '0');
            const day = String(today.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        // 计算两个日期之间的天数差
        function calculateDaysDiff(date1, date2) {
            const d1 = new Date(date1);
            const d2 = new Date(date2);
            const diffTime = Math.abs(d2.getTime() - d1.getTime());
            const diffDays = Math.round(diffTime / (1000 * 60 * 60 * 24));
            return diffDays;
        }

        // 推算日期
        function calculateFutureDate(startDate, amount, unit) {
            const date = new Date(startDate);
            
            switch (unit) {
                case 'days':
                    date.setDate(date.getDate() + amount);
                    break;
                case 'weeks':
                    date.setDate(date.getDate() + amount * 7);
                    break;
                case 'months':
                    date.setMonth(date.getMonth() + amount);
                    break;
                case 'years':
                    date.setFullYear(date.getFullYear() + amount);
                    break;
            }
            
            return date;
        }

        // 格式化日期显示
        function formatDateDisplay(date) {
            const weekDays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
            const year = date.getFullYear();
            const month = date.getMonth() + 1;
            const day = date.getDate();
            const weekDay = weekDays[date.getDay()];
            return `${year}年${month}月${day}日 ${weekDay}`;
        }

        // 格式化日期为 YYYY-MM-DD
        function formatDateISO(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        // 获取单位名称
        function getUnitName(unit) {
            const names = {
                'days': '天',
                'weeks': '星期',
                'months': '个月',
                'years': '年'
            };
            return names[unit] || unit;
        }

        // DOM 元素
        const date1Input = document.getElementById('date1');
        const date2Input = document.getElementById('date2');
        const daysDiffDisplay = document.getElementById('daysDiff');
        
        const startDateInput = document.getElementById('startDate');
        const amountInput = document.getElementById('amount');
        const unitSelect = document.getElementById('unit');
        const calculationDesc = document.getElementById('calculationDesc');
        const futureDateDisplay = document.getElementById('futureDate');
        const futureDateDetail = document.getElementById('futureDateDetail');

        // 初始化日期为今天
        const today = getTodayString();
        date1Input.value = today;
        date2Input.value = today;
        startDateInput.value = today;

        // 更新日期差
        function updateDaysDiff() {
            const d1 = date1Input.value;
            const d2 = date2Input.value;
            if (d1 && d2) {
                const diff = calculateDaysDiff(d1, d2);
                daysDiffDisplay.textContent = diff.toLocaleString();
            }
        }

        // 更新推算日期
        function updateFutureDate() {
            const start = startDateInput.value;
            const amt = parseInt(amountInput.value) || 0;
            const u = unitSelect.value;

            if (start) {
                const result = calculateFutureDate(start, amt, u);
                const formattedDate = formatDateDisplay(result);
                
                // 更新描述
                const startDateObj = new Date(start);
                const startFormatted = formatDateDisplay(startDateObj);
                const direction = amt >= 0 ? '后' : '前';
                
                calculationDesc.textContent = `${startFormatted} ${direction} ${Math.abs(amt)} ${getUnitName(u)}`;
                futureDateDisplay.textContent = formattedDate;
                futureDateDetail.textContent = `(${formatDateISO(result)})`;
            }
        }

        // 事件监听
        date1Input.addEventListener('change', updateDaysDiff);
        date2Input.addEventListener('change', updateDaysDiff);
        startDateInput.addEventListener('change', updateFutureDate);
        amountInput.addEventListener('input', updateFutureDate);
        unitSelect.addEventListener('change', updateFutureDate);

        // 初始化计算
        updateDaysDiff();
        updateFutureDate();
    </script>
</body>
</html>
